<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>سامانه مدرسه یاب مدارس ابتدایی ناحیه پنج مشهد مقدس</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>

body{
margin:0;
background:#08234f;
font-family:Vazirmatn,Tahoma;
}

.header img{
width:100%;
display:block;
}

.container{
width:90%;
max-width:900px;
margin:auto;
margin-top:20px;
}

.box{

background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.25);

}

h2{

text-align:center;
color:#08357a;
margin-top:0;

}

select,input{

width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #bbb;
font-size:17px;
box-sizing:border-box;

}

button{

width:100%;
padding:16px;
margin-top:18px;
background:#0a3478;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:background 0.3s;

}

button:hover{

background:#0c4aa8;

}

.result{

margin-top:30px;
display:none;

}

.schoolTitle{

background:#0a3478;
color:white;
padding:18px;
border-radius:15px;
font-size:28px;
font-weight:bold;
text-align:center;

}

.info{

background:white;
margin-top:10px;
padding:18px;
border-radius:15px;
line-height:2;
border:2px solid #0a3478;

}

.footer{

text-align:center;
color:white;
padding:30px;
font-size:14px;

}

</style>

</head>

<body>

<div class="header">

<img src="header.jpg" alt="هدر">

</div>

<div class="container">

<div class="box">

<h2>

سامانه مدرسه یاب مدارس ابتدایی ناحیه پنج مشهد مقدس

</h2>

<select id="gender">
<option value="">-- جنسیت را انتخاب کنید --</option>
<option value="دخترانه">دخترانه</option>
<option value="پسرانه">پسرانه</option>
</select>

<select id="grade">
<option value="">-- پایه را انتخاب کنید --</option>
<option>اول</option>
<option>دوم</option>
<option>سوم</option>
<option>چهارم</option>
<option>پنجم</option>
<option>ششم</option>
</select>

<input id="street" placeholder="نام کوچه" type="text">

<input id="number" placeholder="شماره کوچه" type="number">

<button onclick="searchSchool()">جستجوی مدرسه</button>

<div class="result" id="result"></div>

</div>

</div>

<div class="footer">

طراحی شده برای اداره آموزش و پرورش ناحیه پنج مشهد مقدس

</div>

<script src="js/search.js"></script>

</body>

</html>
